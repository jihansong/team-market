name: Deploy sakata-dashboard to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'sakata-dashboard/**'
      - '.github/workflows/pages.yml'
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yfinance
        run: pip install --quiet yfinance pandas

      - name: Fetch KOSPI / KOSDAQ daily candles from Yahoo Finance
        run: |
          set -e
          mkdir -p sakata-dashboard/data
          python <<'PY'
          import yfinance as yf
          import pandas as pd
          from datetime import date, timedelta
          import sys

          end = date.today()
          start = end - timedelta(days=365 * 6 + 30)
          targets = {"kospi": "^KS11", "kosdaq": "^KQ11"}

          for name, sym in targets.items():
              print(f"::group::fetching {name} ({sym})")
              df = yf.download(sym, start=start.isoformat(), end=end.isoformat(),
                               progress=False, auto_adjust=False)
              if df is None or df.empty:
                  print(f"::error::{name} fetch returned empty dataframe")
                  sys.exit(1)
              if isinstance(df.columns, pd.MultiIndex):
                  df.columns = [c[0] for c in df.columns]
              df = df.dropna(subset=["Open", "High", "Low", "Close"])
              df = df[["Open", "High", "Low", "Close"]].round(4)
              df.index.name = "Date"
              path = f"sakata-dashboard/data/{name}.csv"
              df.to_csv(path)
              with open(path) as f:
                  head = [next(f) for _ in range(2)]
              print("".join(head).rstrip())
              print(f"rows: {len(df)}")
              if len(df) < 100:
                  print(f"::error::{name} too few rows: {len(df)}")
                  sys.exit(1)
              print("::endgroup::")
          PY

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: sakata-dashboard
      - id: deployment
        uses: actions/deploy-pages@v4

